<!DOCTYPE html>
<html>
  <head>
    <title>Hand Brush Drawing</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <video id="input_video" width="727" height="479" autoplay muted></video>
    <canvas id="output_canvas" width="727" height="479"></canvas>

    <div id="controls">
      <label for="colorPicker">Brush Color:</label>
      <input type="color" id="colorPicker" value="#ff69b4" />
      <label for="lineWidth">Brush Size:</label>
      <select id="lineWidth">
        <option value="3">Thin</option>
        <option value="5" selected>Medium</option>
        <option value="8">Thick</option>
        <option value="12">Extra Thick</option>
      </select>
      <button id="goToPostcard">Go to postcard</button>
    </div>

    <div class="qa-grid">
      <div class="qa-box">
        <p>
          If you had to introduce yourself to others in just one sentence, what
          would you say?
        </p>
        <textarea class="qa-input" data-id="qa1"></textarea>
      </div>
      <div class="qa-box">
        <p>When do you feel most like yourself?</p>
        <textarea class="qa-input" data-id="qa2"></textarea>
      </div>
      <div class="qa-box">
        <p>What do you value the most in your life these days?</p>
        <textarea class="qa-input" data-id="qa3"></textarea>
      </div>
      <div class="qa-box">
        <p>
          Looking back, who did you want to be? Looking at today, who have you
          become? Looking ahead, who are you becoming?
        </p>
        <textarea class="qa-input" data-id="qa4"></textarea>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="script.js"></script>
  </body>

  <style>
    body {
      font-family: 'Courier Prime', monospace;
    }
  </style>
</html>
